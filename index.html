<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>

    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- daisyui and tailwind cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
     <link rel="stylesheet" href="./style/style.css">
</head>
<body class="bg-[#f8fafc]">
  
    <section class="w-6/12 mx-auto bg-white shadow p-7 rounded space-y-8 ">
        <div class=" flex flex-col text-center items-center space-y-2">
            <img src="./assets/github-logo.png" alt="">
            <h1 class="text-2xl ">GitHub Issues Tracker</h1>
            <p class="ct">Sign in to manage your issues</p>
        </div>

        <div class="space-y-6">
            <label class="font-semibold text-sm" for="">Username</label><br>
            <input id="input-name" class="rounded p-1 border border-gray-300 outline-none w-full" type="text" placeholder="Enter Username ">
            <br>
            <label class="font-semibold text-sm" for="">Password</label><br>
            <input id="input-pass"  class="rounded p-1 border border-gray-300 outline-none w-full" type="password" placeholder="Enter Password">

            <button id="login-btn" class="btn btn-primary w-full">Sign in </button>

            <div>
                <div class="flex w-full gap-2 justify-center items-center">
                    <div class=" border  border-gray-300 w-full h-0"></div>
                    <h2>OR</h2>
                    <div class="border  border-gray-300 w-full h-0"></div>
                </div>

                <div class="text-center  space-y-1">
                    <p class="ct py-8">Demo Credentials:</p>
                    <p><span class="font-semibold">Username:</span>admin</p>
                    <p><span class="font-semibold">Password:</span>admin123</p>
                </div>
            </div>
        </div>

    </section>


    <script src="./script/script.js"></script>
</body>
</html>
